name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*' # ◄ Only triggers when a release tag is pushed

jobs:
  publish:
    name: OIDC Production Release
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run isolated verification tests
        run: dart test

      - name: Push package to pub.dev registry
        run: dart pub publish --force